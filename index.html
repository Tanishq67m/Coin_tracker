<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Coin Tracker</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <!-- Controls -->
        <div class="controls">

            <input
                type="text"
                id="searchInput"
                placeholder="Search By Name or Symbol"
            >

            <button id="marketCapBtn">
                Sort By Mkt Cap
            </button>

            <button id="percentageBtn">
                Sort by Percentage
            </button>

        </div>

        <!-- Coin Table -->
        <table>

            <tbody id="tableBody">

            </tbody>

        </table>

    </div>

    <script src="script.js"></script>

</body>
</html>
